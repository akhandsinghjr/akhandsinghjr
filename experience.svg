<svg fill="none" viewBox="0 0 800 160" width="800" height="160" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .wrap {
          width: 800px;
          height: 160px;
          background: #0d1117;
          font-family: 'Courier New', monospace;
          padding: 20px 40px;
        }
        .section-label {
          font-size: 10px;
          letter-spacing: 0.15em;
          color: #4ade80;
          margin-bottom: 14px;
          text-transform: uppercase;
        }
        .grid {
          display: flex;
          gap: 12px;
        }
        .card {
          flex: 1;
          background: #161b22;
          border: 1px solid #21262d;
          border-radius: 8px;
          padding: 14px 16px;
          transition: border-color 0.2s;
        }
        .logo {
          font-size: 10px;
          letter-spacing: 0.1em;
          color: #4ade80;
          margin-bottom: 6px;
          font-weight: 700;
        }
        .title {
          font-size: 13px;
          color: #e6edf3;
          font-weight: 600;
          margin-bottom: 4px;
        }
        .meta {
          font-size: 11px;
          color: #6e7681;
          display: flex;
          align-items: center;
          gap: 6px;
        }
        .dot {
          width: 7px;
          height: 7px;
          border-radius: 50%;
          background: #4ade80;
          display: inline-block;
        }
        .dot.past { background: #6e7681; }
      </style>
      <div class="wrap">
        <div class="section-label">// experience</div>
        <div class="grid">
          <div class="card">
            <div class="logo">◆ SALESFORCE</div>
            <div class="title">Associate Member of Technical Staff</div>
            <div class="meta"><span class="dot"></span> Current</div>
          </div>
          <div class="card">
            <div class="logo">◈ CISCO</div>
            <div class="title">Software Development Engineer Intern</div>
            <div class="meta"><span class="dot past"></span> Summer 2024</div>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
