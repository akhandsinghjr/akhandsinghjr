<svg fill="none" viewBox="0 0 800 220" width="800" height="220" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .wrap {
          width: 800px;
          height: 220px;
          background: #0d1117;
          font-family: 'Courier New', monospace;
          padding: 20px 40px;
        }
        .section-label {
          font-size: 10px;
          letter-spacing: 0.15em;
          color: #4ade80;
          margin-bottom: 14px;
          text-transform: uppercase;
        }
        .code-container {
          background: #161b22;
          border: 1px solid #21262d;
          border-radius: 8px;
          padding: 16px 20px;
          transition: border-color 0.2s;
        }
        .code-block {
          font-size: 13px;
          color: #e6edf3;
          line-height: 1.6;
          white-space: pre;
        }
        /* Syntax Highlighting Colors */
        .keyword { color: #ff7b72; }    /* Red/Pink for keywords like const */
        .prop { color: #79c0ff; }       /* Light blue for object properties */
        .string { color: #4ade80; }     /* Using your signature green for strings */
        .comment { color: #8b949e; }    /* Grey for comments */
        .punct { color: #e6edf3; }      /* Standard white for punctuation */
      </style>
      
      <div class="wrap">
        <div class="section-label">// about</div>
        <div class="code-container">
          <div class="code-block"><span class="keyword">const</span> profile <span class="punct">=</span> {
  <span class="prop">currentFocus</span><span class="punct">:</span> <span class="string">"Backend Architecture &amp; Scalable Systems"</span><span class="punct">,</span>
  <span class="prop">education</span><span class="punct">:</span>    <span class="string">"BTech CSE @ IIT Patna"</span><span class="punct">,</span>
  <span class="prop">interests</span><span class="punct">:</span>    <span class="punct">[</span><span class="string">"Distributed Systems"</span><span class="punct">,</span> <span class="string">"Quizzing"</span><span class="punct">,</span> <span class="string">"Software Eng"</span><span class="punct">],</span>
  <span class="prop">fuel</span><span class="punct">:</span>         <span class="string">"Coffee"</span> <span class="comment">/* lots of it */</span>
}<span class="punct">;</span></div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
