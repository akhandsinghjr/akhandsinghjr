<svg fill="none" viewBox="0 0 800 220" width="800" height="220" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .container {
          width: 800px;
          height: 220px;
          padding: 15px; /* Adds space for the shadow to render properly */
          background: transparent;
        }
        .wrap {
          width: 100%;
          height: 100%;
          /* Glassmorphism styling */
          background: linear-gradient(135deg, rgba(48, 54, 61, 0.4) 0%, rgba(13, 17, 23, 0.6) 100%);
          backdrop-filter: blur(10px);
          border-radius: 16px;
          border: 1px solid rgba(255, 255, 255, 0.08);
          box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.05);
          
          font-family: 'Courier New', monospace;
          display: flex;
          flex-direction: column;
          justify-content: center;
          padding: 0 40px;
          position: relative;
          overflow: hidden;
        }
        /* Subtle lighting effect behind text */
        .wrap::before {
          content: '';
          position: absolute;
          top: -30%;
          right: -10%;
          width: 500px;
          height: 500px;
          background: radial-gradient(circle, rgba(74,222,128,0.03) 0%, transparent 60%);
          z-index: 0;
          pointer-events: none;
        }
        .content {
          position: relative;
          z-index: 1;
        }
        .prompt {
          font-size: 14px;
          color: #4ade80;
          margin-bottom: 8px;
          letter-spacing: 0.05em;
        }
        .name {
          font-size: 42px;
          font-weight: 700;
          color: #e6edf3;
          letter-spacing: -0.02em;
          line-height: 1;
          margin-bottom: 12px;
        }
        .name span { color: #4ade80; }
        .sub {
          font-size: 15px;
          color: #8b949e;
          letter-spacing: 0.03em;
          margin-bottom: 20px;
        }
        .tags {
          display: flex;
          gap: 12px;
          flex-wrap: wrap;
        }
        .tag {
          font-size: 13px;
          padding: 5px 14px;
          border-radius: 99px;
          border: 1px solid rgba(255,255,255,0.15);
          color: #8b949e;
          background: rgba(22, 27, 34, 0.4);
        }
        .tag.green {
          border-color: rgba(74,222,128,0.4);
          color: #4ade80;
          background: rgba(74,222,128,0.05);
        }
        @keyframes blink { 50% { opacity: 0; } }
        .cursor {
          display: inline-block;
          animation: blink 1s step-end infinite;
          color: #4ade80;
          vertical-align: text-bottom;
        }
      </style>
      <div class="container">
        <div class="wrap">
          <div class="prompt">~/akhandsinghjr <span class="cursor">█</span></div>
          <div class="name">Akhand Singh<span>.</span></div>
          <div class="sub">BTech CSE · IIT Patna · AMTS @ Salesforce</div>
          <div class="tags">
            <span class="tag green">backend developer</span>
            <span class="tag">systems &amp; software</span>
            <span class="tag">quizzer</span>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
