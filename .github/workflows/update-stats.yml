name: Update Custom Stats SVG

on:
  schedule:
    - cron: "0 0 * * *" # Runs daily at midnight UTC
  workflow_dispatch:    # Allows you to trigger it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate Custom Stats
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: node scripts/generate-stats.js

      - name: Generate Stats - Langs
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: node scripts/generate-langs.js

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update dynamic stats and langs svgs"
          file_pattern: "*.svg"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
